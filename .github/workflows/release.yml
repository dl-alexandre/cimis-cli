name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (re-run GoReleaser)'
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}


      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if release already published
        id: published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh release view "${{ steps.tag.outputs.name }}" \
            --json assets -q '.assets | length' 2>/dev/null || echo 0)
          echo "asset_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -ge 6 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Release already published
        if: steps.published.outputs.skip == 'true'
        run: |
          echo "Release ${{ steps.tag.outputs.name }} already has ${{ steps.published.outputs.asset_count }} assets — skipping publish"
      - name: Checkout cimis-tsdb dependency
        uses: actions/checkout@v7
        with:
          repository: dl-alexandre/cimis-tsdb
          path: _deps/cimis-tsdb
          token: ${{ secrets.GH_PAT }}

      - name: Set up Go
        if: steps.published.outputs.skip != 'true'
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'

      - name: Configure git for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Download dependencies
        run: go mod download
        env:
          GOPRIVATE: github.com/dl-alexandre/*

      - name: Run GoReleaser
        if: steps.published.outputs.skip != 'true'
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          GOPRIVATE: github.com/dl-alexandre/*