name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './docs'
      - name: Deploy to GitHub Pages (attempt 1)
        id: deploy1
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Deploy to GitHub Pages (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome != 'success'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Deploy to GitHub Pages (attempt 3)
        id: deploy3
        if: steps.deploy1.outcome != 'success' && steps.deploy2.outcome != 'success'
        uses: actions/deploy-pages@v5
        continue-on-error: true
      - name: Resolve deployment result
        id: deployment
        if: always()
        run: |
          if [ "${{ steps.deploy1.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy1.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deploy2.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy2.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.deploy3.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy3.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "Pages deployment failed after 3 attempts"
            exit 1
          fi