# GoReleaser configuration
# Documentation: https://goreleaser.com

version: 2

project_name: cimis

before:
  hooks:
    - go mod tidy
    - go mod verify
    - go test ./...

builds:
  - id: cimis
    main: ./cmd/cimis
    binary: cimis
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.gitCommit={{.Commit}}
      - -X main.buildTime={{.Date}}
    flags:
      - -trimpath

archives:
  - id: cimis
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: dl-alexandre
    name: cimis-cli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## CIMIS CLI v{{.Version}}
    
    Full Changelog: https://github.com/dl-alexandre/cimis-cli/compare/{{.PreviousTag}}...v{{.Version}}
  footer: |
    ## Installation
    
    ### Binary Download
    Download the appropriate binary for your platform from the assets below.
    
    ### Verification
    Verify checksums:
    ```bash
    sha256sum -c checksums.txt
    ```

# Homebrew tap configuration
brews:
  - name: cimis
    repository:
      owner: dl-alexandre
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: master
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: goreleaser@carlosbecker.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    description: "CLI for California Irrigation Management Information System (CIMIS) weather data"
    homepage: "https://github.com/dl-alexandre/cimis-cli"
    license: "MIT"
    skip_upload: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}false{{ else }}true{{ end }}"
    test: |
      system "#{bin}/cimis", "version"
    install: |
      bin.install "cimis"

# Scoop configuration for Windows
scoops:
  - repository:
      owner: dl-alexandre
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
      branch: main
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: goreleaser@carlosbecker.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    directory: bucket
    description: "CLI for California Irrigation Management Information System (CIMIS) weather data"
    homepage: "https://github.com/dl-alexandre/cimis-cli"
    license: MIT
    skip_upload: "{{ if index .Env \"SCOOP_BUCKET_TOKEN\" }}false{{ else }}true{{ end }}"
    persist:
      - "config.yaml"
